services:
  - type: web
    name: geoacquire-api
    env: php
    region: singapore
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate --force
      php artisan config:cache
      php artisan route:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://geoacquire-api.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: mysql-gisapp-raihanftsl-6377.e.aivencloud.com
      - key: DB_PORT
        value: "28656"
      - key: DB_DATABASE
        value: defaultdb
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: MYSQL_ATTR_SSL_CA
        value: /app/database/certs/aiven-ca.pem
      - key: CACHE_DRIVER
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
    deployHooks:
      - name: Run Migrations
        cmd: php artisan migrate --force
      - name: Seed Database
        cmd: php artisan db:seed --force
